name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Run tests on every push / PR ──────────────────────────────────────────
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: npm install
      - run: npm run build:ts
      - run: npm test
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Create the GitHub Release (once) ──────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: `Tracer ${tag}`,
              body: [
                '## Download',
                '',
                '| Chip | File |',
                '|------|------|',
                '| Apple Silicon (M1/M2/M3) | `Tracer_*_aarch64.dmg` |',
                '| Intel | `Tracer_*_x64.dmg` |',
                '',
                '## Install',
                '1. Download the `.dmg` for your chip',
                '2. Open it and drag **Tracer.app** to `/Applications`',
                '3. First launch: right-click → **Open** (bypasses Gatekeeper — app is unsigned)',
                '',
                '## Requirements',
                'macOS 13 (Ventura) or later'
              ].join('\\n'),
              draft: false,
              prerelease: false,
            });
            return data.id;

  # ── Build .dmg for each platform and upload ───────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-13       # Intel
            target: x86_64-apple-darwin
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: npm install
      - run: npm run build:ts

      - name: Build and upload .dmg
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
