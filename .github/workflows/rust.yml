name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: npm install
      - run: npm run build:ts
      - run: npm test
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add universal macOS targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: npm install
      - run: npm run build:ts

      - name: Build and release universal DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Tracer v__VERSION__
          releaseBody: |
            ## Download

            | File | Supports |
            |------|---------|
            | `Tracer_*_universal.dmg` | Apple Silicon (M1/M2/M3) + Intel |

            ## Install
            1. Download the `.dmg`
            2. Open it and drag **Tracer.app** to `/Applications`
            3. First launch: right-click → **Open** (bypasses Gatekeeper — app is unsigned)

            ## Requirements
            macOS 13 (Ventura) or later
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
